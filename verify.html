<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8860b;--gold-light:#d4a843;--gold-pale:#f5e6c0;
  --navy:#0a1628;--navy-mid:#142247;--blue:#1e3a8a;--blue-light:#2d5be3;
  --cream:#fdfaf4;--white:#ffffff;--text:#1a1a2e;--muted:#6b7280;
  --green:#065f46;--green-bg:#ecfdf5;--green-border:#6ee7b7;
  --red:#991b1b;--red-bg:#fef2f2;
}
body{background:var(--navy);min-height:100vh;font-family:'Inter',sans-serif;color:var(--text);}

nav{background:var(--navy);border-bottom:1px solid rgba(184,134,11,.3);padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.nav-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-weight:900;font-size:.85rem;color:var(--navy);}
.nav-brand{display:flex;align-items:center;gap:.8rem;}
.nav-title{font-family:'Cinzel',serif;font-size:.85rem;font-weight:600;color:var(--gold-light);letter-spacing:.05em;}
.nav-sub{font-size:.6rem;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:.5rem;font-size:.65rem;color:rgba(255,255,255,.35);letter-spacing:.08em;}
.dot-pulse{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.page{background:var(--cream);min-height:calc(100vh - 64px);padding:3rem 1.5rem 5rem;}

.page-header{text-align:center;margin-bottom:2.8rem;animation:fadeUp .6s ease both;}
.tag{display:inline-block;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold-light);padding:.3rem .9rem;border-radius:20px;
  margin-bottom:.9rem;background:rgba(212,168,67,.08);}
.page-header h1{font-family:'Cinzel',serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:700;color:var(--navy);}
.page-header p{margin-top:.5rem;font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--muted);}
.ornament{display:flex;align-items:center;justify-content:center;gap:.7rem;margin:.8rem 0;}
.orn-line{height:1px;width:50px;background:linear-gradient(90deg,transparent,var(--gold-light));}
.orn-line.r{background:linear-gradient(90deg,var(--gold-light),transparent);}
.orn-diamond{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);}

/* INVALID */
.invalid-wrap{max-width:480px;margin:0 auto;background:var(--red-bg);
  border:1.5px solid #fca5a5;border-radius:12px;padding:3rem 2rem;text-align:center;}
.invalid-wrap h2{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--red);margin:1rem 0 .5rem;}
.invalid-wrap p{font-size:.8rem;color:#7f1d1d;line-height:1.7;}

/* VERIFY BADGE */
.verify-status{max-width:780px;margin:0 auto 2rem;display:flex;align-items:center;gap:1rem;
  background:var(--green-bg);border:1.5px solid var(--green-border);border-radius:10px;
  padding:1rem 1.5rem;animation:fadeUp .5s .1s ease both;}
.verify-icon{width:44px;height:44px;flex-shrink:0;background:#dcfce7;border-radius:50%;
  display:flex;align-items:center;justify-content:center;}
.verify-text h3{font-size:.85rem;font-weight:600;color:var(--green);}
.verify-text p{font-size:.7rem;color:#047857;margin-top:.1rem;}
.verify-id{margin-left:auto;font-size:.62rem;color:#059669;font-family:monospace;
  background:#d1fae5;padding:.3rem .7rem;border-radius:4px;white-space:nowrap;letter-spacing:.04em;}

/* CERTIFICATE */
.cert-wrap{max-width:780px;margin:0 auto 2.5rem;animation:fadeUp .6s .2s ease both;}
.certificate{background:var(--white);border:3px solid var(--gold);border-radius:4px;
  position:relative;overflow:hidden;
  box-shadow:0 24px 64px rgba(10,22,40,.2),0 4px 16px rgba(184,134,11,.15);}
.certificate::before{content:'';position:absolute;inset:10px;
  border:1px solid rgba(184,134,11,.3);pointer-events:none;z-index:1;}
.cert-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cinzel',serif;font-size:8rem;font-weight:900;
  color:rgba(184,134,11,.04);white-space:nowrap;pointer-events:none;user-select:none;}

/* cert top */
.cert-top{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,#1e3a8a 100%);
  padding:2rem 2.5rem 1.8rem;position:relative;overflow:hidden;}
.cert-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));}
.bg-circle{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.05);}
.bg-circle.c1{width:220px;height:220px;top:-90px;right:-70px;}
.bg-circle.c2{width:140px;height:140px;bottom:-50px;left:10px;}

.cert-logos{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.6rem;position:relative;z-index:2;}
.logo-box{width:54px;height:54px;background:rgba(255,255,255,.1);border:1px solid rgba(184,134,11,.4);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-weight:900;font-size:.65rem;color:var(--gold-light);
  text-align:center;line-height:1.3;}
.logo-box.center{width:68px;height:68px;font-size:.8rem;
  background:linear-gradient(135deg,rgba(184,134,11,.25),rgba(212,168,67,.12));
  border:2px solid var(--gold);}

.cert-headline{text-align:center;position:relative;z-index:2;}
.cert-headline .pre{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.3em;
  text-transform:uppercase;color:var(--gold-light);margin-bottom:.3rem;}
.cert-headline h2{font-family:'Cinzel',serif;font-size:clamp(2.2rem,5.5vw,3.4rem);
  font-weight:900;color:var(--white);letter-spacing:.06em;line-height:1;
  text-shadow:0 2px 24px rgba(0,0,0,.5);}
.cert-headline .type-label{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.2em;
  color:var(--gold-light);text-transform:uppercase;margin-top:.4rem;}
.cert-headline .cert-no{font-size:.62rem;color:rgba(255,255,255,.35);
  letter-spacing:.14em;font-family:monospace;margin-top:.7rem;}

/* cert body */
.cert-body{padding:2.5rem 3rem;text-align:center;position:relative;}
.cert-intro{font-family:'Cormorant Garamond',serif;font-size:1.05rem;
  color:#6b7280;font-style:italic;margin-bottom:.6rem;}
.cert-name{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,2.9rem);
  font-weight:700;color:var(--navy);border-bottom:2px solid var(--gold-light);
  display:inline-block;padding-bottom:.3rem;margin-bottom:1rem;line-height:1.2;}
.ribbon{display:inline-flex;align-items:center;gap:.5rem;
  padding:.5rem 1.5rem;border-radius:3px;font-family:'Cinzel',serif;
  font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:#fff;margin-bottom:1.2rem;}
.ribbon.winner{background:linear-gradient(135deg,#92400e,#b45309,#d97706);
  box-shadow:0 4px 14px rgba(180,83,9,.3);}
.ribbon.participant{background:linear-gradient(135deg,#065f46,#059669,#10b981);
  box-shadow:0 4px 14px rgba(5,150,105,.25);}
.cert-desc{font-family:'Cormorant Garamond',serif;font-size:1.05rem;
  color:#374151;line-height:1.75;max-width:520px;margin:0 auto 1.2rem;}
.cert-desc em{font-weight:600;font-style:italic;color:var(--navy);}
.cert-desc strong{font-weight:600;color:var(--blue);}
.cert-stars{display:flex;align-items:center;justify-content:center;gap:.8rem;margin:1rem 0;}
.cert-stars .s-line{height:1px;width:80px;background:linear-gradient(90deg,transparent,var(--gold-light));}
.cert-stars .s-line.r{background:linear-gradient(90deg,var(--gold-light),transparent);}
.cert-stars .star{color:var(--gold);font-size:.9rem;}

/* cert footer */
.cert-footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;
  padding:1.5rem 3rem 2.2rem;border-top:1px solid rgba(184,134,11,.2);gap:1rem;}
.sig-block{text-align:center;}
.sig-line{width:140px;border-bottom:1.5px solid var(--navy);margin:0 auto .4rem;}
.sig-name{font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;
  color:var(--navy);letter-spacing:.04em;}
.sig-role{font-size:.58rem;color:var(--muted);margin-top:.15rem;letter-spacing:.08em;}
.cert-seal{width:96px;height:96px;border-radius:50%;border:3px solid var(--gold);
  background:linear-gradient(135deg,var(--navy),var(--navy-mid));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;position:relative;
  box-shadow:0 0 0 6px rgba(184,134,11,.12),0 6px 20px rgba(0,0,0,.25);}
.cert-seal::before{content:'';position:absolute;inset:5px;border-radius:50%;border:1px solid rgba(184,134,11,.35);}
.seal-icon{font-size:1.3rem;z-index:1;}
.seal-text{font-size:.35rem;color:var(--gold-light);letter-spacing:.15em;text-transform:uppercase;
  text-align:center;line-height:1.6;z-index:1;margin-top:.15rem;}
.cert-date-block{text-align:right;}
.date-label{font-size:.58rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.2rem;}
.date-val{font-family:'Cinzel',serif;font-size:.85rem;color:var(--navy);font-weight:600;}
.id-label{font-size:.55rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.5rem;}
.id-val{font-size:.65rem;color:var(--blue);font-family:monospace;margin-top:.1rem;}

/* DETAILS TABLE */
.details-panel{max-width:780px;margin:0 auto 2rem;background:var(--white);
  border:1.5px solid #e5e7eb;border-radius:12px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.06);animation:fadeUp .6s .35s ease both;}
.details-head{background:var(--navy);padding:1rem 1.8rem;
  display:flex;align-items:center;justify-content:space-between;}
.details-head h3{font-family:'Cinzel',serif;font-size:.8rem;font-weight:600;
  color:var(--gold-light);letter-spacing:.1em;text-transform:uppercase;}
.details-head .stamp{font-size:.6rem;color:rgba(255,255,255,.3);font-family:monospace;letter-spacing:.06em;}
.details-grid{display:grid;grid-template-columns:1fr 1fr;}
.detail-item{padding:1.2rem 1.8rem;border-bottom:1px solid #f3f4f6;border-right:1px solid #f3f4f6;}
.detail-item:nth-child(even){border-right:none;}
.detail-item:nth-last-child(-n+2){border-bottom:none;}
.d-label{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;font-weight:500;}
.d-value{font-size:.88rem;color:var(--navy);font-weight:500;}
.d-value.big{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--blue);}
.d-value.green{color:var(--green);font-weight:600;}
.d-value.gold{color:var(--gold);font-weight:600;}
.d-value.mono{font-family:monospace;font-size:.78rem;}

footer{background:var(--navy);padding:2rem;text-align:center;border-top:1px solid rgba(184,134,11,.2);}
.footer-brand{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold-light);margin-bottom:.4rem;letter-spacing:.08em;}
footer p{font-size:.62rem;color:rgba(255,255,255,.25);letter-spacing:.1em;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .cert-top{padding:1.4rem 1.2rem 1.6rem;}
  .cert-body{padding:2rem 1.4rem;}
  .cert-footer{grid-template-columns:1fr;justify-items:center;padding:1.5rem;gap:1.5rem;text-align:center;}
  .cert-date-block{text-align:center;}
  .details-grid{grid-template-columns:1fr;}
  .detail-item{border-right:none;}
  .detail-item:nth-last-child(-n+2){border-bottom:1px solid #f3f4f6;}
  .detail-item:last-child{border-bottom:none;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo">CV</div>
    <div>
      <div class="nav-title">CertVerify Portal</div>
      <div class="nav-sub">Official Certificate Verification</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="dot-pulse"></div>
    System Online
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="tag">🔍 Verification Portal</div>
    <h1>Certificate Authentication</h1>
    <div class="ornament">
      <div class="orn-line"></div><div class="orn-diamond"></div><div class="orn-line r"></div>
    </div>
    <p>Scan results are retrieved from the official issuer database</p>
  </div>
  <div id="root"></div>
</div>

<footer>
  <div class="footer-brand" id="footer-brand">CertVerify Portal</div>
  <p id="footer-sub">Official Certificate Verification System</p>
</footer>

<script>
const p = new URLSearchParams(window.location.search);
const name   = p.get('name');
const type   = p.get('type') || 'participant';
const club   = p.get('club');
const event  = p.get('event');
const date   = p.get('date');
const certId = p.get('id');
const by     = p.get('by');
const root   = document.getElementById('root');
const isW    = type === 'winner';
const ts     = new Date().toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'});

if (!name || !club || !event) {
  root.innerHTML = `<div class="invalid-wrap">
    <div style="font-size:3.5rem">⚠️</div>
    <h2>Certificate Not Found</h2>
    <p>This link is invalid or incomplete.<br>Please scan the original QR code on the certificate.</p>
  </div>`;
} else {
  document.getElementById('footer-brand').textContent = `${club} · CertVerify Portal`;
  document.getElementById('footer-sub').textContent   = `${event} · Issued by ${by || club}`;
  const abbr = club.split(' ').map(w=>w[0]).join('').slice(0,4).toUpperCase();

  root.innerHTML = `
  <div class="verify-status">
    <div class="verify-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#065f46" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <div class="verify-text">
      <h3>✅ Certificate Successfully Verified</h3>
      <p>Authenticated by ${club} &nbsp;·&nbsp; Verified on ${ts}</p>
    </div>
    <div class="verify-id">${certId || 'N/A'}</div>
  </div>

  <div class="cert-wrap">
    <div class="certificate">
      <div class="cert-watermark">VERIFIED</div>

      <div class="cert-top">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
        <div class="cert-logos">
          <div class="logo-box">${abbr}</div>
          <div class="logo-box center">★<br>CERT</div>
          <div class="logo-box">OFFCL<br>SEAL</div>
        </div>
        <div class="cert-headline">
          <div class="pre">This is to Certify that</div>
          <h2>CERTIFICATE</h2>
          <div class="type-label">${isW ? 'of Achievement' : 'of Participation'}</div>
          <div class="cert-no">Certificate No. : ${certId || 'N/A'}</div>
        </div>
      </div>

      <div class="cert-body">
        <div class="cert-intro">This is to certify that</div>
        <div class="cert-name">${name}</div>
        <div>
          <div class="ribbon ${isW ? 'winner' : 'participant'}">
            ${isW ? '🏆 Winner' : '✅ Certificate of Participation'}
          </div>
        </div>
        <p class="cert-desc">
          has successfully ${isW ? 'won' : 'participated'} in
          <em>"${event}"</em>
          organized by <strong>${club}</strong>.
          This certificate is awarded in recognition of their
          ${isW ? 'outstanding achievement and excellence demonstrated' : 'valuable participation and contribution'}.
        </p>
        <div class="cert-stars">
          <div class="s-line"></div>
          <div class="star">✦</div><div class="star">✦</div><div class="star">✦</div>
          <div class="s-line r"></div>
        </div>
      </div>

      <div class="cert-footer">
        <div class="sig-block">
          <div class="sig-line"></div>
          <div class="sig-name">${by || 'Coordinator'}</div>
          <div class="sig-role">Faculty Coordinator, ${club}</div>
        </div>
        <div class="cert-seal">
          <div class="seal-icon">⭐</div>
          <div class="seal-text">OFFICIAL<br>SEAL<br>${abbr}</div>
        </div>
        <div class="cert-date-block">
          <div class="date-label">Date of Issue</div>
          <div class="date-val">${date || 'N/A'}</div>
          <div class="id-label">Certificate ID</div>
          <div class="id-val">${certId || 'N/A'}</div>
        </div>
      </div>
    </div>
  </div>

  <div class="details-panel">
    <div class="details-head">
      <h3>📋 Verification Details</h3>
      <div class="stamp">Verified · ${ts}</div>
    </div>
    <div class="details-grid">
      <div class="detail-item"><div class="d-label">Full Name</div><div class="d-value big">${name}</div></div>
      <div class="detail-item"><div class="d-label">Certificate Type</div><div class="d-value ${isW?'gold':'green'}">${isW?'🏆 Winner':'✅ Participant'}</div></div>
      <div class="detail-item"><div class="d-label">Event / Program</div><div class="d-value">${event}</div></div>
      <div class="detail-item"><div class="d-label">Issuing Organization</div><div class="d-value">${club}</div></div>
      <div class="detail-item"><div class="d-label">Date of Issue</div><div class="d-value">${date||'N/A'}</div></div>
      <div class="detail-item"><div class="d-label">Issued By</div><div class="d-value">${by||'N/A'}</div></div>
      <div class="detail-item"><div class="d-label">Certificate ID</div><div class="d-value mono">${certId||'N/A'}</div></div>
      <div class="detail-item"><div class="d-label">Verification Status</div><div class="d-value green">✅ Authentic & Valid</div></div>
    </div>
  </div>`;
}
</script>
</body>
</html>
